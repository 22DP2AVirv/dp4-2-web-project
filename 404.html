<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lapa nav atrasta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/awesome/css/fontawesome.min.css" rel="stylesheet">
    <link href="/assets/awesome/css/solid.css" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #0b2430;
            --brand-light: #4db7c5;
            --brand-soft: #0f3444;
            --text-main: #e8f3fb;
            --text-muted: #9fc8d8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            background: radial-gradient(circle at top left, rgba(77, 183, 197, 0.15), transparent 24%),
                        radial-gradient(circle at bottom right, rgba(11, 36, 48, 0.45), transparent 25%),
                        linear-gradient(180deg, #07161f 0%, #081b26 100%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .error-panel {
            width: 100%;
            max-width: 680px;
            background: rgba(5, 17, 28, 0.94);
            border: 1px solid rgba(77, 183, 197, 0.16);
            box-shadow: 0 28px 80px rgba(1, 10, 20, 0.55);
            border-radius: 32px;
            padding: 48px;
            text-align: center;
            backdrop-filter: blur(18px);
        }

        .error-icon {
            width: 96px;
            height: 96px;
            margin: 0 auto 24px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(11, 36, 48, 0.66), rgba(77, 183, 197, 0.12));
            color: var(--brand-light);
            font-size: 40px;
        }

        .error-code {
            font-size: clamp(88px, 12vw, 120px);
            font-weight: 900;
            line-height: 0.92;
            margin: 0;
            background: linear-gradient(135deg, var(--brand-light), var(--brand-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-title {
            font-size: clamp(24px, 3vw, 34px);
            margin: 18px 0 12px;
            font-weight: 700;
            color: var(--text-main);
        }

        .error-message {
            max-width: 560px;
            margin: 0 auto 30px;
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-muted);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        .btn-home,
        .btn-contact {
            padding: 14px 32px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn-home {
            background: linear-gradient(135deg, var(--brand-light), #0b3346);
            color: white;
            box-shadow: 0 22px 40px rgba(0, 0, 0, 0.24);
        }

        .btn-contact {
            background: rgba(77, 183, 197, 0.12);
            color: var(--brand-light);
            border-color: rgba(77, 183, 197, 0.18);
        }

        .btn-home:hover,
        .btn-contact:hover {
            transform: translateY(-2px);
        }

        .btn-home:hover {
            box-shadow: 0 26px 48px rgba(0, 0, 0, 0.28);
        }

        .btn-contact:hover {
            background: rgba(77, 183, 197, 0.18);
        }

        @media (max-width: 600px) {
            .error-panel {
                padding: 32px 24px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-home,
            .btn-contact {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="error-panel">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Lapa nav atrasta</h2>
        <p class="error-message">
            Šķiet, ka šī lapa pašlaik nav pieejama. Atgriezies uz sākumlapu vai sazinies ar mums, ja nepieciešama palīdzība.
        </p>
        <div class="button-group">
            <a href="index.html" class="btn-home">
                <i class="fas fa-home"></i> Sākumlapa
            </a>
            <a href="kontakti.html" class="btn-contact">
                <i class="fas fa-envelope"></i> Kontakti
            </a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
