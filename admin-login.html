<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administratora panelis - Ieeja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/admin-style.css">
</head>
<body>
    <main class="admin-auth-shell">
        <section class="admin-login-card">
            <p class="admin-kicker">Administratora vide</p>
            <h1>Ieeja panelī</h1>
            <p>
                Šī sadaļa paredzēta tikai administratoram. Pieslēdzies ar administratora
                e-pastu un paroli, lai pārvaldītu lietotājus, saturu un pieteikumus.
            </p>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="login" class="form-label">E-pasts</label>
                    <input type="email" class="form-control" id="login" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Parole</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Ienākt</button>
            </form>

            <div id="error" class="text-danger text-center mt-3" style="display:none;">
                Nepareizs e-pasts vai parole.
            </div>

            <p class="admin-login-note">Pēc pieslēgšanās tiksi novirzīts uz lietotāju sadaļu.</p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/admin-login.js"></script>
</body>
</html>
